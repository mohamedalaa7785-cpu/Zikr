<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بلا اتصال - ذِكر</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Noto Naskh Arabic', 'Amiri', 'Scheherazade New', 'Segoe UI', Tahoma, Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0e4b45 0%, #072e2a 60%);
      color: #f6f0e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      text-align: center;
      background: rgba(14, 75, 69, 0.5);
      border: 1px solid rgba(199, 168, 107, 0.3);
      border-radius: 12px;
      padding: 40px 30px;
      backdrop-filter: blur(10px);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #c7a86b;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #c8c0af;
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #c7a86b;
      color: #072e2a;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #e6d7b3;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: #c7a86b;
      border: 2px solid #c7a86b;
    }

    .btn-secondary:hover {
      background: rgba(199, 168, 107, 0.1);
    }

    .tips {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(199, 168, 107, 0.2);
      font-size: 14px;
      color: #8fa49f;
    }

    .tips h3 {
      font-size: 14px;
      color: #c7a86b;
      margin-bottom: 12px;
    }

    .tips ul {
      list-style: none;
      text-align: right;
    }

    .tips li {
      margin-bottom: 8px;
    }

    .tips li:before {
      content: "✓ ";
      color: #c7a86b;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>بلا اتصال بالإنترنت</h1>
    <p>يبدو أنك غير متصل بالإنترنت. تحقق من اتصالك وحاول مرة أخرى.</p>

    <div class="actions">
      <button class="btn-primary" onclick="location.reload()">
        حاول مرة أخرى
      </button>
      <button class="btn-secondary" onclick="history.back()">
        العودة للخلف
      </button>
    </div>

    <div class="tips">
      <h3>نصائح:</h3>
      <ul>
        <li>تحقق من اتصال الواي فاي أو البيانات</li>
        <li>أعد تشغيل جهازك</li>
        <li>جرب الاتصال بشبكة أخرى</li>
      </ul>
    </div>
  </div>
</body>
</html>
