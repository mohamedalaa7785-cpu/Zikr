name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck and build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://zikr.app
      AUTH_CALLBACK_URL: https://zikr.app/auth/callback
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm check
      - name: Production build
        run: pnpm build
